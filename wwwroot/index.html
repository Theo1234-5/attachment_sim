<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attachment Sim</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="AttachmentSim.styles.css" />
</head>
<body>
    <div id="app">Loading...</div>
    <script>
    window.attachmentSim = {
        getBounds() {
            const c = document.getElementById('simCanvas');
            if (!c) return { left:0, top:0, width:660, height:400 };
            const r = c.getBoundingClientRect();
            return { left:r.left, top:r.top, width:r.width, height:r.height };
        },
        draw(data) {
            const canvas = document.getElementById('simCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const { agents, tick } = data;
            ctx.clearRect(0,0,660,400);
            ctx.fillStyle='#050810'; ctx.fillRect(0,0,660,400);
            ctx.strokeStyle='rgba(255,255,255,0.022)'; ctx.lineWidth=1;
            for(let x=0;x<=660;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,400);ctx.stroke();}
            for(let y=0;y<=400;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(660,y);ctx.stroke();}
            for(const agent of agents){
                const col=agent.stage==='infant'?'#ffffff':agent.styleColor;
                const op=agent.opacity;
                if(agent.trail.length>1){
                    ctx.beginPath();ctx.moveTo(agent.trail[0].x,agent.trail[0].y);
                    for(let i=1;i<agent.trail.length;i++) ctx.lineTo(agent.trail[i].x,agent.trail[i].y);
                    ctx.strokeStyle=col+'22';ctx.lineWidth=1;ctx.globalAlpha=op;ctx.stroke();ctx.globalAlpha=1;
                }
                if(agent.hasDistress){
                    const p=(Math.sin(tick*0.35)+1)*0.5;
                    ctx.beginPath();ctx.arc(agent.x,agent.y,15+p*8,0,Math.PI*2);
                    ctx.strokeStyle=`rgba(255,80,80,${0.2+p*0.5})`;ctx.lineWidth=2;
                    ctx.globalAlpha=op;ctx.stroke();ctx.globalAlpha=1;
                }
                if(agent.hasTask&&agent.taskColor){
                    const p=(Math.sin(tick*0.2)+1)*0.5;
                    ctx.beginPath();ctx.arc(agent.x,agent.y,14+p*4,0,Math.PI*2);
                    ctx.strokeStyle=agent.taskColor;ctx.lineWidth=1.5;
                    ctx.globalAlpha=op*(0.4+p*0.4);ctx.stroke();ctx.globalAlpha=1;
                }
                if(agent.isSelected){
                    ctx.beginPath();ctx.arc(agent.x,agent.y,14,0,Math.PI*2);
                    ctx.strokeStyle='#ffffff44';ctx.lineWidth=1;ctx.setLineDash([3,3]);
                    ctx.globalAlpha=op;ctx.stroke();ctx.globalAlpha=1;ctx.setLineDash([]);
                }
                ctx.save();
                ctx.globalAlpha=(0.4+agent.happiness*0.55)*op;
                ctx.shadowColor=col;ctx.shadowBlur=agent.isSelected?22:10;
                ctx.fillStyle=col;
                ctx.beginPath();ctx.arc(agent.x,agent.y,8,0,Math.PI*2);ctx.fill();
                ctx.restore();
                ctx.save();ctx.globalAlpha=0.75*op;
                ctx.strokeStyle=col;ctx.lineWidth=1.6;
                ctx.beginPath();ctx.arc(agent.x,agent.y,11,0,Math.PI*2);ctx.stroke();
                ctx.restore();
                ctx.save();ctx.globalAlpha=op;
                ctx.fillStyle='#ffffffbb';
                ctx.beginPath();ctx.arc(agent.x,agent.y,2.2,0,Math.PI*2);ctx.fill();
                ctx.restore();
                ctx.save();ctx.globalAlpha=0.55*op;ctx.fillStyle='#fff';
                ctx.font='7px monospace';ctx.textAlign='center';
                ctx.fillText(`G${agent.gen}`,agent.x,agent.y+22);
                ctx.textAlign='left';ctx.restore();
            }
        }
    };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
